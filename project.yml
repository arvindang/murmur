name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.6"
  AXorcist:
    url: https://github.com/steipete/AXorcist
    from: "0.1.0"
  SwiftReadability:
    url: https://github.com/lake-of-fire/swift-readability
    branch: main

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
    settings:
      base:
        INFOPLIST_FILE: Murmur/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Murmur/Resources/Murmur.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: KeyboardShortcuts
      - package: LaunchAtLogin
      - package: Defaults
      - package: AXorcist
      - package: SwiftReadability
    postBuildScripts:
      - script: tccutil reset Accessibility com.murmur.app
        name: Reset Accessibility TCC
