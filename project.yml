name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.6"
  AXorcist:
    url: https://github.com/steipete/AXorcist
    from: "0.1.0"
  SwiftReadability:
    url: https://github.com/lake-of-fire/swift-readability
    branch: main

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Murmur
    settings:
      base:
        INFOPLIST_FILE: Murmur/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.murmur.app
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_NAME: Murmur
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
          ENABLE_HARDENED_RUNTIME: "NO"
          CODE_SIGN_ENTITLEMENTS: Murmur/Resources/MurmurDebug.entitlements
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
          PROVISIONING_PROFILE_SPECIFIER: ""
          ENABLE_HARDENED_RUNTIME: "YES"
          CODE_SIGN_ENTITLEMENTS: Murmur/Resources/Murmur.entitlements
    dependencies:
      - package: KeyboardShortcuts
      - package: LaunchAtLogin
      - package: Defaults
      - package: AXorcist
      - package: SwiftReadability
    postBuildScripts:
      - script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
            tccutil reset Accessibility com.murmur.app
          fi
        name: Reset Accessibility TCC (Debug only)
